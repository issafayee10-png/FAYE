<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra & Gil | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f7e1cc;
    --text:#3a2a22;
    --accent:#c06a3d;
    --card:rgba(255,255,255,0.78);
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    overflow-x:hidden;
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f7e1cc,#f3d6be);
    color:var(--text);
}

/* GLOBAL TYPOGRAPHY */
h1,h2{
    font-family:'Playfair Display',serif;
}

h1{
    font-size:clamp(42px,6vw,72px);
}

h2{
    font-size:clamp(20px,3vw,28px);
    color:var(--accent);
}

/* SECTIONS */
section{
    max-width:1100px;
    margin:auto;
    padding:70px 24px;
    text-align:center;
}

/* CARD */
.card{
    background:var(--card);
    padding:22px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    backdrop-filter:blur(10px);
    max-width:800px;
    margin:auto;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
        linear-gradient(to top, rgba(40,20,10,0.75), rgba(0,0,0,0.2)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero p{
    opacity:0.9;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
}

.countdown div{
    min-width:70px;
}

/* SLIDESHOW */
.slideshow{
    max-width:800px;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
}

.slide{display:none;}
.slide img{width:100%;display:block;}

/* MAP RESPONSIVE FIX */
.map iframe{
    width:100%;
    height:420px;
    border:0;
    border-radius:16px;
}

/* MOBILE MAP */
@media(max-width:768px){
    .map iframe{
        height:260px;
    }
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    font-size:12px;
    z-index:9999;
}

/* PETALS */
.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(30px);opacity:0;}
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Tap Music</button>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Ezra & Gil</h1>
        <p>We’re getting married</p>
        <p>August 8, 2026</p>
    </div>
</section>

<!-- STORY -->
<section>
    <h2>Our Story</h2>
    <div class="card">A love written softly through time.</div>
</section>

<!-- DETAILS -->
<section>
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>Date:</strong> August 8, 2026</p>
        <p><strong>Time:</strong> 3:00 PM</p>
        <p><strong>Venue:</strong> Maribojoc Church, Bohol</p>
    </div>
</section>

<!-- MAP (FIXED YOUR EXACT LINK) -->
<section>
    <h2>Location</h2>
    <div class="card map">

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.300598257248!2d123.84111061018679!3d9.740584777405351!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aa4ba8d05c451f%3A0xb2970777a443c5a6!2sMaribojoc%20Church%20(Holy%20Cross%20Parish)!5e0!3m2!1sen!2sph!4v1776604955397!5m2!1sen!2sph"
        loading="lazy"
        allowfullscreen></iframe>

    </div>
</section>

<!-- COUNTDOWN -->
<section>
    <h2>Countdown to Forever 💍</h2>
    <div class="card countdown">
        <div><h3 id="days">0</h3><p>Days</p></div>
        <div><h3 id="hours">0</h3><p>Hrs</p></div>
        <div><h3 id="minutes">0</h3><p>Mins</p></div>
        <div><h3 id="seconds">0</h3><p>Secs</p></div>
    </div>
</section>

<script>

/* MUSIC (FIXED TAP-TO-PLAY) */
const music = document.getElementById("music");
let playing = false;

function toggleMusic(){
    if(!playing){
        music.volume = 1;
        music.play();
        playing = true;
    }else{
        music.pause();
        playing = false;
    }
}

/* TAP ANYWHERE START MUSIC */
document.addEventListener("click", function startOnce(){
    if(!playing){
        music.play().catch(()=>{});
        playing = true;
    }
    document.removeEventListener("click", startOnce);
});

/* COUNTDOWN */
const wedding = new Date("August 8, 2026 15:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let d = wedding - now;

    let day = 86400000,
        h = 3600000,
        m = 60000,
        s = 1000;

    document.getElementById("days").innerText = Math.max(0, Math.floor(d/day));
    document.getElementById("hours").innerText = Math.max(0, Math.floor((d%day)/h));
    document.getElementById("minutes").innerText = Math.max(0, Math.floor((d%h)/m));
    document.getElementById("seconds").innerText = Math.max(0, Math.floor((d%m)/s));
},1000);

/* SLIDESHOW */
let i=0;
function show(){
    let slides=document.querySelectorAll(".slide");
    slides.forEach(s=>s.style.display="none");
    i++; if(i>slides.length)i=1;
    slides[i-1].style.display="block";
    setTimeout(show,3500);
}
show();

/* PETALS */
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

</script>

</body>
</html>
