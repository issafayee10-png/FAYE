<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra May & Gil Jun | Wedding Film</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--accent:#b06a3c;
--glass:rgba(255,255,255,0.10);
--text:#3b2a22;
--title:#3a241a;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:'Montserrat',sans-serif;
overflow-x:hidden;
color:#fff;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
inset:0;
    background:url('https://i.imgur.com/OKELscg.jpeg') center/cover no-repeat;
    background:url('https://i.imgur.com/R0CVxJG.jpeg') center/cover no-repeat;
transform:scale(1.1);
animation:zoom 25s infinite alternate;
z-index:-2;
}
body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(180deg,rgba(0,0,0,0.35),rgba(0,0,0,0.75));
z-index:-1;
}
@keyframes zoom{
from{transform:scale(1.1)}
to{transform:scale(1.2)}
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}
