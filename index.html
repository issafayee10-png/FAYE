<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra May & Gil Jun | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6e7da;
    --text:#3b2a22;
    --accent:#b06a3c;
    --card:rgba(245, 230, 210, 0.82);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f6e7da,#e9c9a6,#d8ad82);
    color:var(--text);
    overflow-x:hidden;
}

/* cinematic grain */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/film-grain.png');
    opacity:0.05;
    pointer-events:none;
}

/* TYPOGRAPHY */
h1,h2{
    font-family:'Playfair Display',serif;
}

h2{
    font-size:26px;
    color:var(--accent);
    margin-bottom:12px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.55)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:clamp(48px,6vw,78px);
}

.hero p{
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:0.85;
}

/* SECTION FLOW (CANVA STYLE) */
section{
    max-width:850px;
    margin:auto;
    padding:42px 18px;
    text-align:center;
    opacity:0;
    transform:translateY(18px);
    animation:fadeIn 1.2s ease forwards;
}

section + section{
    margin-top:-6px;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* CARD (SOFT CANVA STYLE) */
.card{
    background:var(--card);
    padding:18px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
    backdrop-filter:blur(8px);
    max-width:520px;
    margin:auto;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.countdown div{
    min-width:65px;
}

.countdown h3{
    font-size:16px;
    color:var(--accent);
}

.countdown p{
    font-size:10px;
    opacity:0.7;
}

/* MAP */
.map iframe{
    width:100%;
    height:320px;
    border:0;
    border-radius:14px;
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    font-size:12px;
    z-index:9999;
}

/* PETALS */
.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(30px);opacity:0;}
}

/* MOBILE */
@media(max-width:768px){
    .hero h1{font-size:42px;}
    .map iframe{height:240px;}
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Ezra May & Gil Jun</h1>
        <p>We’re getting married</p>
        <p>August 8, 2026</p>
    </div>
</section>

<!-- STORY -->
<section>
    <h2>Our Story</h2>
    <div class="card">
        A cinematic love written through time.
    </div>
</section>

<!-- DETAILS -->
<section>
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>📅 Date:</strong> August 8, 2026</p>
        <p><strong>⏰ Time:</strong> 3:00 PM</p>
        <p><strong>📍 Venue:</strong> Maribojoc Church, Bohol</p>
    </div>
</section>

<!-- MAP -->
<section>
    <h2>Location</h2>
    <div class="card map">
        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.300598257248!2d123.84111061018679!3d9.740584777405351!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aa4ba8d05c451f%3A0xb2970777a443c5a6!2sMaribojoc%20Church%20(Holy%20Cross%20Parish)!5e0!3m2!1sen!2sph!4v1776604955397!5m2!1sen!2sph"
        loading="lazy"></iframe>
    </div>
</section>

<!-- COUNTDOWN -->
<section>
    <h2>Countdown to Forever</h2>
    <div class="card countdown">
        <div><h3 id="days">0</h3><p>Days</p></div>
        <div><h3 id="hours">0</h3><p>Hrs</p></div>
        <div><h3 id="minutes">0</h3><p>Mins</p></div>
        <div><h3 id="seconds">0</h3><p>Secs</p></div>
    </div>
</section>

<script>

/* 🎵 TAP TO PLAY MUSIC (WORKS ON ALL BROWSERS) */
const music = document.getElementById("music");
let unlocked = false;

function unlockMusic(){
    if(unlocked) return;

    music.volume = 1;

    music.play().then(()=>{
        unlocked = true;
    }).catch(()=>{});
}

document.addEventListener("pointerdown", unlockMusic, {once:true});

function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

/* ⏳ COUNTDOWN */
const wedding = new Date("August 8, 2026 15:00:00").getTime();

setInterval(()=>{
    let now = new Date().getTime();
    let d = wedding - now;

    let day = 86400000,
        h = 3600000,
        m = 60000,
        s = 1000;

    document.getElementById("days").innerText = Math.max(0, Math.floor(d/day));
    document.getElementById("hours").innerText = Math.max(0, Math.floor((d%day)/h));
    document.getElementById("minutes").innerText = Math.max(0, Math.floor((d%h)/m));
    document.getElementById("seconds").innerText = Math.max(0, Math.floor((d%m)/s));
},1000);

/* 🌸 PETALS */
for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}

</script>

</body>
</html>
