<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: #2f241d;
  background: #f3ece3;
  overflow-x: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: zoom 18s ease-in-out infinite alternate;
  filter: brightness(0.7);
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.12); }
}

.hero-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 70px;
  margin: 0;
}

.hero p {
  letter-spacing: 3px;
  font-size: 14px;
}

/* STORY CARD */
.story-wrap {
  margin-top: -120px;
  display: flex;
  justify-content: center;
}

.story-card {
  background: #f8f1e8;
  padding: 60px;
  border-radius: 20px;
  width: 70%;
  text-align: center;
  box-shadow: 0 25px 70px rgba(0,0,0,0.2);
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.story-card.show {
  opacity: 1;
  transform: translateY(0);
}

/* SPLIT SECTION */
.split {
  display: flex;
  min-height: 500px;
  margin-top: 80px;
}

.split-img {
  flex: 1;
}

.split-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.split-text {
  flex: 1;
  padding: 80px;
  background: #f8f1e8;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* PARALLAX IMAGE */
.image-break {
  height: 70vh;
  background: url('https://i.imgur.com/jCRvOTr.jpeg') center/cover fixed;
}

/* CENTER SECTION */
.center {
  text-align: center;
  padding: 100px 20px;
}

/* RSVP */
.rsvp {
  text-align: center;
  padding: 120px 20px;
  background: #3b2a22;
  color: white;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 30px;
  background: white;
  color: #3b2a22;
  text-decoration: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fffaf4;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

/* FADE */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media (max-width: 700px) {
  .split {
    flex-direction: column;
  }

  .story-card {
    width: 90%;
    padding: 40px;
  }

  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://i.imgur.com/fDf6us1.jpeg">
  <div class="hero-text">
    <h1>Ezra & Gil</h1>
    <p>August 8, 2026 • Bohol Tropics</p>
  </div>
</div>

<!-- STORY -->
<div class="story-wrap">
  <div class="story-card fade">
    <h2>Our Story</h2>
    <p>A journey of love, patience, and choosing each other every day.</p>
  </div>
</div>

<!-- TIMELINE -->
<div class="split fade">
  <div class="split-img">
    <img src="https://i.imgur.com/fDf6us1.jpeg">
  </div>
  <div class="split-text">
    <h2>Timeline</h2>
    <p>2:00 PM – Arrival</p>
    <p>3:00 PM – Ceremony</p>
    <p>5:00 PM – Reception</p>
  </div>
</div>

<!-- IMAGE BREAK -->
<div class="image-break"></div>

<!-- LOCATION -->
<div class="center fade">
  <h2>Location</h2>
  <p>Bohol Tropics, Tagbilaran City</p>

  <a class="btn"
     href="https://www.google.com/maps/search/?api=1&query=Bohol+Tropics"
     target="_blank">
     View Map
  </a>
</div>

<!-- RSVP -->
<div class="rsvp fade">
  <h2>Join Us</h2>
  <div class="btn" onclick="openModal()">RSVP</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>RSVP</h3>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScueXyfNMzhTMvDMtRraSgaGaPuuLd8D1myfrTZ8_XArCumfw/viewform" target="_blank">Open Form</a>
    <br><br>
    <div class="btn" onclick="closeModal()">Close</div>
  </div>
</div>

<script>
// fade on scroll
const fades = document.querySelectorAll('.fade');

function showOnScroll() {
  fades.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showOnScroll);
showOnScroll();

// modal
function openModal() {
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
