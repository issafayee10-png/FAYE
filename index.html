<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra & Gil | Cinematic Wedding Film</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f7e1cc;
    --text:#3a2a22;
    --accent:#c06a3d;
    --card:rgba(255,255,255,0.78);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f7e1cc,#f3d6be);
    color:var(--text);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/noise.png');
    opacity:0.05;
    pointer-events:none;
    z-index:999;
}

h1,h2{font-family:'Playfair Display',serif;}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    background:
        linear-gradient(to top, rgba(40,20,10,0.75), rgba(0,0,0,0.2)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:72px;
}

.hero p{opacity:0.9;}

section{
    max-width:900px;
    margin:auto;
    padding:70px 18px;
    text-align:center;
}

h2{
    font-size:26px;
    margin-bottom:16px;
    color:var(--accent);
}

.card{
    background:var(--card);
    padding:22px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    backdrop-filter:blur(10px);
}

.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.countdown div{min-width:60px;}
.countdown h3{font-size:16px;color:var(--accent);}
.countdown p{font-size:10px;opacity:0.7;}

.slideshow{
    max-width:720px;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
}

.slide{display:none;}
.slide img{width:100%;display:block;}

.map iframe{
    width:100%;
    height:260px;
    border:0;
    border-radius:16px;
}

.music-btn{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    z-index:9999;
    font-size:12px;
}

.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(30px);opacity:0;}
}

/* MUSIC INTRO GLOW */
.music-glow{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center, rgba(192,106,61,0.15), transparent 60%);
    opacity:0;
    transition:1s;
}
.music-glow.active{opacity:1;}

@media(max-width:768px){
    .hero h1{font-size:42px;}
}
</style>
</head>

<body>

<div class="music-glow" id="glow"></div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Tap to Play</button>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Ezra & Gil</h1>
        <p>We’re getting married</p>
        <p>August 8, 2026</p>
    </div>
</section>

<!-- STORY -->
<section>
    <h2>Our Story</h2>
    <div class="card">A love written softly through time.</div>
</section>

<!-- SLIDESHOW -->
<section>
    <h2>Moments</h2>
    <div class="slideshow">
        <div class="slide"><img src="https://i.imgur.com/HgBD7Mz.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/kZ9Y1kr.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/fDf6us1.jpeg"></div>
    </div>
</section>

<!-- DETAILS -->
<section>
    <h2>Wedding Details</h2>
    <div class="card">
        <p><strong>Date:</strong> August 8, 2026</p>
        <p><strong>Time:</strong> 3:00 PM</p>
        <p><strong>Venue:</strong> Maribojoc Church, Bohol</p>
    </div>
</section>

<!-- MAP -->
<section>
    <h2>Location</h2>
    <div class="card map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.300598257248!2d123.84111061018679!3d9.740584777405351"></iframe>
    </div>
</section>

<!-- COUNTDOWN -->
<section>
    <h2>Countdown to Forever 💍</h2>
    <div class="card countdown">
        <div><h3 id="days">0</h3><p>Days</p></div>
        <div><h3 id="hours">0</h3><p>Hrs</p></div>
        <div><h3 id="minutes">0</h3><p>Mins</p></div>
        <div><h3 id="seconds">0</h3><p>Secs</p></div>
    </div>
</section>

<script>
const music=document.getElementById("music");
const glow=document.getElementById("glow");
let started=false;

function startMusic(){
    if(started) return;

    music.volume=0;
    music.play().then(()=>{
        glow.classList.add("active");
        let f=setInterval(()=>{
            if(music.volume<0.5) music.volume+=0.05;
            else clearInterval(f);
        },200);
    }).catch(()=>{});

    started=true;
}

function toggleMusic(){
    if(music.paused){
        startMusic();
    }else{
        music.pause();
    }
}

// TAP ANYWHERE TO START MUSIC (CINEMATIC EXPERIENCE)
document.addEventListener("click", startMusic, {once:true});

// COUNTDOWN
const wedding=new Date("August 8, 2026 15:00:00").getTime();
setInterval(()=>{
    let now=new Date().getTime();
    let d=wedding-now;
    let day=86400000,h=3600000,m=60000,s=1000;

    document.getElementById("days").innerText=Math.max(0,Math.floor(d/day));
    document.getElementById("hours").innerText=Math.max(0,Math.floor((d%day)/h));
    document.getElementById("minutes").innerText=Math.max(0,Math.floor((d%h)/m));
    document.getElementById("seconds").innerText=Math.max(0,Math.floor((d%m)/s));
},1000);

// SLIDESHOW
let i=0;
function show(){
    let slides=document.querySelectorAll(".slide");
    slides.forEach(s=>s.style.display="none");
    i++; if(i>slides.length)i=1;
    slides[i-1].style.display="block";
    setTimeout(show,3500);
}
show();

// PETALS
for(let i=0;i<30;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

</body>
</html>
