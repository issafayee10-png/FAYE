<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra & Gil | Cinematic Wedding Film</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6ddc7;
    --text:#3a2a22;
    --accent:#c06a3d;
    --card:rgba(255,255,255,0.72);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f6ddc7,#f3d2bb);
    color:var(--text);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/noise.png');
    opacity:0.05;
    pointer-events:none;
    z-index:999;
}

h1,h2{font-family:'Playfair Display',serif;letter-spacing:0.3px;}

/* CINEMATIC SECTIONS */
.scene{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 18px;
    position:relative;
}

/* HERO */
.hero{
    background:
        linear-gradient(to top, rgba(30,15,10,0.72), rgba(0,0,0,0.2)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:74px;
    text-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.hero p{opacity:0.9;}

/* CARD */
.card{
    background:var(--card);
    padding:24px;
    border-radius:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 18px 40px rgba(0,0,0,0.10);
    max-width:720px;
    width:100%;
}

/* COUNTDOWN LUXURY */
.countdown{
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
}
.countdown div{
    min-width:60px;
}
.countdown h3{
    color:var(--accent);
    font-size:18px;
}
.countdown p{
    font-size:10px;
    opacity:0.7;
    letter-spacing:1px;
}

/* SLIDESHOW PREMIUM */
.slideshow{
    position:relative;
    width:100%;
    max-width:720px;
    height:420px;
    overflow:hidden;
    border-radius:22px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.slide{
    position:absolute;
    inset:0;
    opacity:0;
    transition:opacity 1.6s ease;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.05);
}

/* MAP PREMIUM */
.map iframe{
    width:100%;
    height:240px;
    border:0;
    border-radius:18px;
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    z-index:9999;
    font-size:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* PETALS */
.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(25px);opacity:0;}
}

/* FADE IN */
.fade{
    animation:fadeUp 1.2s ease both;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
    .hero h1{font-size:44px;}
    .slideshow{height:280px;}
    .card{padding:18px;}
}

</style>
</head>

<body>

<!-- HERO -->
<section class="scene hero fade">
    <div>
        <h1>Ezra & Gil</h1>
        <p>We’re getting married</p>
        <p>August 8, 2026</p>
    </div>
</section>

<!-- STORY -->
<section class="scene fade">
    <div class="card">
        <h2>Our Story</h2>
        <p>A love story written softly through time, moments, and grace.</p>
    </div>
</section>

<!-- SLIDESHOW -->
<section class="scene fade">
    <div class="slideshow">
        <div class="slide"><img src="https://i.imgur.com/HgBD7Mz.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/kZ9Y1kr.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/fDf6us1.jpeg"></div>
    </div>
</section>

<!-- DETAILS -->
<section class="scene fade">
    <div class="card">
        <h2>Wedding Details</h2>
        <p><strong>Date:</strong> August 8, 2026</p>
        <p><strong>Time:</strong> 3:00 PM</p>
        <p><strong>Venue:</strong> Maribojoc Church, Bohol</p>
    </div>
</section>

<!-- MAP -->
<section class="scene fade">
    <div class="card">
        <h2>Location</h2>
        <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.300598257248!2d123.84111061018679!3d9.740584777405351!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aa4ba8d05c451f%3A0xb2970777a443c5a6!2sMaribojoc%20Church%20(Holy%20Cross%20Parish)!5e0!3m2!1sen!2sph!4v1776604955397!5m2!1sen!2sph"
        loading="lazy"></iframe>
    </div>
</section>

<!-- COUNTDOWN -->
<section class="scene fade">
    <div class="card countdown">
        <div><h3 id="days">0</h3><p>Days</p></div>
        <div><h3 id="hours">0</h3><p>Hrs</p></div>
        <div><h3 id="minutes">0</h3><p>Mins</p></div>
        <div><h3 id="seconds">0</h3><p>Secs</p></div>
    </div>
</section>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<script>
function toggleMusic(){
    let m=document.getElementById('music');
    if(m.paused)m.play(); else m.pause();
}

// countdown
const wedding=new Date("August 8, 2026 15:00:00").getTime();
setInterval(()=>{
    let now=new Date().getTime();
    let d=wedding-now;
    let day=86400000,h=3600000,m=60000,s=1000;

    document.getElementById("days").innerText=Math.floor(d/day);
    document.getElementById("hours").innerText=Math.floor((d%day)/h);
    document.getElementById("minutes").innerText=Math.floor((d%h)/m);
    document.getElementById("seconds").innerText=Math.floor((d%m)/s);
},1000);

// slideshow
let i=0;
function show(){
    let slides=document.querySelectorAll('.slide');
    slides.forEach(s=>s.style.opacity=0);
    i++; if(i>slides.length)i=1;
    slides[i-1].style.opacity=1;
    setTimeout(show,4200);
}
show();

// petals
for(let i=0;i<28;i++){
    let p=document.createElement('div');
    p.className='petal';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(5+Math.random()*5)+'s';
    document.body.appendChild(p);
}
</script>

</body>
</html>
