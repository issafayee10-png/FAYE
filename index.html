<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ezra & Gil Wedding</title>

  <style>
    * {
      box-sizing: border-box;
      .leaves {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.leaves::before {
  content: "🍂 🍁 🍂 🍁 🍂 🍁 🍂 🍁";
  position: absolute;
  top: -50px;
  left: 0;
  width: 100%;
  font-size: 24px;
  animation: fall 10s linear infinite;
  opacity: 0.6;
}

@keyframes fall {
  0% { transform: translateY(-10%); }
  100% { transform: translateY(110%); }
}
    }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(to bottom, #f6e7d7, #e7c8a2);
      color: #4a3324;
      text-align: center;
      <div class="leaves"></div>
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      margin: 15px 0;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 26px;
      margin: 10px 0;
      line-height: 1.3;
    }

    .subtitle {
      font-style: italic;
      margin-bottom: 10px;
    }

    img {
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      margin-top: 10px;
    }

    p {
      margin: 6px 0;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      background: #7a4e2d;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 14px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .footer {
      font-size: 12px;
      opacity: 0.7;
      margin: 20px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="card">
    <h1>Ezra May Asa<br>&<br>Gil Jun Anthony Garan</h1>
    <p class="subtitle">are getting married 💍</p>
    <img src="https://imgur.com/a/gUUKzpg" alt="Couple Photo">
  </div>

  <!-- DETAILS -->
  <div class="card">
    <p><strong>📅 August 8, 2026</strong></p>
    <p>📍 Bohol Tropics</p>
    <p>We would be honored to celebrate with you</p>
  </div>

  <!-- MAP -->
  <div class="card">
    <h3>📍 Location</h3>
    <a class="btn"
       href="https://maps.app.goo.gl/CZn8MjSbFbxwbaR57"
       target="_blank">
      Open Google Maps
    </a>
  </div>

  <!-- RSVP -->
  <div class="card">
    <h3>📝 RSVP</h3>
    <a class="btn" href="https://docs.google.com/forms/d/1x2XINf9wQJ21r6U7vYC1YEbrh1A5_mSZ5OqzO4gO5aA/edit" target="_blank">
      Confirm Attendance
    </a>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Vintage • Fall Wedding 🍂
  </div>

</div>

</body>
</html>
