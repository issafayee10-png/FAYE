<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: "Georgia", serif;
  background: #f6f1e8;
  color: #2f241d;
  overflow-x: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: zoomHero 12s ease-in-out infinite alternate;
}

@keyframes zoomHero {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* GLASS OVERLAY */
.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(4px);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  padding: 20px;
}

.hero-overlay h1 {
  font-size: 42px;
  margin: 0;
}

.hero-overlay p {
  font-style: italic;
}

/* SECTIONS */
.section {
  max-width: 750px;
  margin: auto;
  padding: 100px 25px;
  text-align: center;
}

/* IMAGE BREAK */
.image-block {
  height: 80vh;
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  border-radius: 30px;
  background: #3b2a22;
  color: white;
  text-decoration: none;
}

/* FADE ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: all 1.2s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  pointer-events: none;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(100vh);
  }
}

/* MOBILE */
@media (max-width: 600px) {
  .hero-overlay h1 {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://i.imgur.com/fDf6us1.jpeg">

  <div class="hero-overlay">
    <div>
      <h1>Ezra May Asa<br>&<br>Gil Jun Anthony Garan</h1>
      <p>August 8, 2026 • Bohol Tropics</p>
    </div>
  </div>
</div>

<!-- STORY -->
<div class="section fade">
  <h2>Our Story</h2>
  <p>A journey of love, patience, and becoming one.</p>
</div>

<!-- IMAGE BREAK -->
<div class="image-block" style="background-image:url('https://i.imgur.com/OscEMZZ.jpeg')"></div>

<!-- DETAILS -->
<div class="section fade">
  <h2>Wedding Details</h2>
  <p>August 8, 2026</p>
  <p>Bohol Tropics</p>
</div>

<!-- IMAGE BREAK -->
<div class="image-block" style="background-image:url('https://i.imgur.com/c3xIJO0.jpeg')"></div>

<!-- TIMELINE -->
<div class="section fade">
  <h2>Timeline</h2>
  <p>2:00 PM – Arrival</p>
  <p>3:00 PM – Ceremony</p>
  <p>5:00 PM – Reception</p>
</div>

<!-- MAP -->
<div class="section fade">
  <h2>Location</h2>
  <a class="btn"
     href="https://www.google.com/maps/search/?api=1&query=Bohol+Tropics"
     target="_blank">
     Open Map
  </a>
</div>

<!-- RSVP -->
<div class="section fade">
  <h2>RSVP</h2>
  <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScueXyfNMzhTMvDMtRraSgaGaPuuLd8D1myfrTZ8_XArCumfw/viewform" target="_blank">
    Confirm Attendance
  </a>
</div>

<script>
// FADE
const elements = document.querySelectorAll(".fade");

function reveal() {
  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 80) {
      el.classList.add("show");
    }
  });
}

window.addEventListener("scroll", reveal);
reveal();

// PARTICLES
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  p.style.opacity = Math.random();
  document.body.appendChild(p);
}
</script>

</body>
</html>
