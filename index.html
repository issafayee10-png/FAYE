<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background: #e9dfd2;
  color: #3b2a22;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/fDf6us1.jpeg') center/cover no-repeat;
  filter: blur(2px) brightness(0.9);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255, 248, 240, 0.6);
  z-index: -1;
}

/* TITLE */
.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: 48px;
  font-family: "Times New Roman", serif;
  font-style: italic;
}

.hero p {
  letter-spacing: 2px;
  font-size: 14px;
}

/* COLLAGE AREA */
.canvas {
  position: relative;
  height: 1400px;
}

/* CARD STYLE */
.card {
  position: absolute;
  background: #f8f1e8;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img {
  width: 100%;
  border-radius: 10px;
}

/* POSITIONS (you can tweak these) */
.card1 { top: 50px; left: 10%; width: 250px; }
.card2 { top: 200px; right: 10%; width: 250px; }
.card3 { top: 450px; left: 20%; width: 280px; }

/* CENTER FRAME */
.frame {
  position: absolute;
  top: 700px;
  left: 50%;
  transform: translateX(-50%);
  background: #fffaf4;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 260px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #3b2a22;
  color: white;
  border-radius: 20px;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 600px) {
  .canvas {
    height: auto;
  }

  .card, .frame {
    position: static;
    margin: 20px auto;
    display: block;
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- HERO -->
<div class="hero">
  <p>WE INVITE YOU</p>
  <h1>Ezra May Asa & Gil Jun Anthony Garan</h1>
  <p>August 8, 2026 • Bohol Tropics</p>
</div>

<!-- COLLAGE -->
<div class="canvas">

  <div class="card card1">
    <img src="https://i.imgur.com/OscEMZZ.jpeg">
    <p>Our beginning</p>
  </div>

  <div class="card card2">
    <img src="https://i.imgur.com/c3xIJO0.jpeg">
    <p>The journey</p>
  </div>

  <div class="card card3">
    <img src="https://i.imgur.com/HgBD7Mz.jpeg">
    <p>The promise</p>
  </div>

  <!-- CENTER FRAME -->
  <div class="frame">
    <h3>Order of Events</h3>
    <p>2:00 PM – Arrival</p>
    <p>3:00 PM – Ceremony</p>
    <p>5:00 PM – Reception</p>

    <a class="btn"
       href="https://docs.google.com/forms/d/e/1FAIpQLScueXyfNMzhTMvDMtRraSgaGaPuuLd8D1myfrTZ8_XArCumfw/viewform"
       target="_blank">
       RSVP
    </a>
  </div>

</div>

</body>
</html>
