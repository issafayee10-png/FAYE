<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra & Gil | Cinematic Wedding Film</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f7e1cc;
    --text:#3a2a22;
    --accent:#c06a3d;
    --card:rgba(255,255,255,0.78);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f7e1cc,#f3d6be);
    color:var(--text);
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/noise.png');
    opacity:0.05;
    pointer-events:none;
    z-index:999;
}

h1,h2{font-family:'Playfair Display',serif;}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
    background:
        linear-gradient(to top, rgba(40,20,10,0.75), rgba(0,0,0,0.2)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:72px;
}

.hero p{opacity:0.9;}

section{
    max-width:900px;
    margin:auto;
    padding:70px 18px;
    text-align:center;
}

h2{
    font-size:26px;
    margin-bottom:16px;
    color:var(--accent);
}

.card{
    background:var(--card);
    padding:22px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    backdrop-filter:blur(10px);
}

.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.countdown div{min-width:60px;}
.countdown h3{font-size:16px;color:var(--accent);}
.countdown p{font-size:10px;opacity:0.7;}

.slideshow{
    max-width:720px;
    margin:auto;
    border-radius:18px;
    overflow:hidden;
}

.slide{display:none;}
.slide img{width:100%;display:block;}

.map iframe{
    width:100%;
    height:260px;
    border:0;
    border-radius:16px;
}

.music-btn{
    position:fixed;
    bottom:18px;
    right:18px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    z-index:9999;
    font-size:12px;
}

.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
    pointer-events:none;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(30px);opacity:0;}
}

/* MUSIC INTRO GLOW */
.music-glow{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle at center, rgba(192,106,61,0.15), transparent 60%);
    opacity:0;
    transition:1s;
}
.music-glow.active{opacity:1;}

@media(max-width:768px){
    .hero h1{font-size:42px;}
}
</style>
</head>

<body>

<div class="music-glow" id="glow"></div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn
