<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Georgia', serif;
  color: white;
  overflow-x: hidden;
}

/* SECTION BASE */
.section {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* BACKGROUND IMAGE */
.bg {
  position: absolute;
  width: 100%;
  height: 120%;
  top: 0;
  left: 0;
  background-size: cover;
  background-position: center;
  z-index: -1;
  transform: translateY(0);
}

/* DARK OVERLAY */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
  top: 0;
  left: 0;
  z-index: -1;
}

/* TEXT */
.content {
  max-width: 80%;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s ease;
}

.content.show {
  opacity: 1;
  transform: translateY(0);
}

h1 {
  font-size: 42px;
  margin: 0;
}

h2 {
  font-size: 28px;
}

p {
  font-size: 16px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 22px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 30px;
  text-decoration: none;
  font-size: 14px;
}

/* GALLERY */
.gallery {
  background: #f7f1e8;
  color: #3d2b1f;
  padding: 40px 20px;
}

.gallery img {
  width: 100%;
  margin-bottom: 10px;
  border-radius: 12px;
}

/* MOBILE */
@media (max-width: 600px) {
  h1 { font-size: 28px; }
  h2 { font-size: 22px; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h1>Ezra May Asa<br>&<br>Gil Jun Anthony Garan</h1>
    <p>August 8, 2026 • Bohol Tropics</p>
  </div>
</div>

<!-- STORY -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h2>Our Story</h2>
    <p>A journey of love, patience, and becoming one.</p>
  </div>
</div>

<!-- DETAILS -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h2>Wedding Day</h2>
    <p>August 8, 2026</p>
    <p>Bohol Tropics</p>
  </div>
</div>

<!-- TIMELINE -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h2>Timeline</h2>
    <p>2:00 PM – Arrival</p>
    <p>3:00 PM – Ceremony</p>
    <p>5:00 PM – Reception</p>
  </div>
</div>

<!-- MAP -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h2>Location</h2>
    <a class="btn"
       href="https://www.google.com/maps/search/?api=1&query=Bohol+Tropics"
       target="_blank">
       View Map
    </a>
  </div>
</div>

<!-- RSVP -->
<div class="section">
  <div class="bg" style="background-image: url('https://i.imgur.com/fDf6us1.jpeg');"></div>
  <div class="overlay"></div>
  <div class="content">
    <h2>RSVP</h2>
    <a class="btn" href="https://docs.google.com/forms/d/1x2XINf9wQJ21r6U7vYC1YEbrh1A5_mSZ5OqzO4gO5aA/edit" target="_blank">
      Confirm Attendance
    </a>
  </div>
</div>

<!-- GALLERY -->
<div class="gallery">
  <h2>Gallery</h2>
  <img src="https://i.imgur.com/fDf6us1.jpeg">
  <img src="https://i.imgur.com/fDf6us1.jpeg">
  <img src="https://i.imgur.com/fDf6us1.jpeg">
</div>

<script>
// FADE IN ON SCROLL
const contents = document.querySelectorAll('.content');

function showContent() {
  contents.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', showContent);

// PARALLAX EFFECT
window.addEventListener('scroll', () => {
  document.querySelectorAll('.bg').forEach(bg => {
    let offset = window.pageYOffset;
    bg.style.transform = "translateY(" + offset * 0.2 + "px)";
  });
});
</script>

</body>
</html>
