<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #eae1d5;
  color: #3b2a22;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/fDf6us1.jpeg') center/cover no-repeat;
  filter: blur(3px) brightness(0.85);
  z-index: -2;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,248,240,0.6);
  z-index: -1;
}

/* HERO TEXT */
.hero {
  text-align: center;
  padding: 70px 20px 30px;
}

.hero small {
  letter-spacing: 3px;
  font-size: 12px;
}

.hero h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
  margin: 10px 0;
}

.hero p {
  font-size: 14px;
}

/* COLLAGE AREA */
.canvas {
  position: relative;
  height: 1600px;
}

/* CARDS */
.card {
  position: absolute;
  background: #f8f1e8;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
  width: 220px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card p {
  font-size: 12px;
  margin-top: 8px;
}

/* POSITIONS (adjustable) */
.card1 { top: 80px; left: 8%; transform: rotate(-4deg); }
.card2 { top: 250px; right: 10%; transform: rotate(3deg); }
.card3 { top: 520px; left: 20%; transform: rotate(-2deg); }
.card4 { top: 850px; right: 15%; transform: rotate(2deg); }

/* CENTER FRAME */
.frame {
  position: absolute;
  top: 700px;
  left: 50%;
  transform: translateX(-50%);
  background: #fffaf4;
  padding: 35px;
  border-radius: 25px;
  text-align: center;
  width: 260px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  border: 1px solid #e5d8c7;
}

.frame h3 {
  font-family: 'Great Vibes', cursive;
  font-size: 26px;
  margin-bottom: 10px;
}

.frame p {
  font-size: 14px;
  margin: 5px 0;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 18px;
  background: #3b2a22;
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-size: 13px;
}

/* LOCATION CARD */
.location {
  position: absolute;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  background: #f8f1e8;
  padding: 20px;
  border-radius: 12px;
  width: 260px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.location h4 {
  margin: 5px 0;
}

/* MOBILE */
@media (max-width: 600px) {
  .canvas {
    height: auto;
  }

  .card, .frame, .location {
    position: static;
    margin: 20px auto;
    transform: none !important;
    width: 90%;
  }

  .hero h1 {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- HERO -->
<div class="hero">
  <small>WE INVITE YOU</small>
  <h1>Ezra May Asa & Gil Jun Anthony Garan</h1>
  <p>August 8, 2026 • Bohol Tropics</p>
</div>

<!-- COLLAGE -->
<div class="canvas">

  <div class="card card1">
    <img src="https://i.imgur.com/OscEMZZ.jpeg">
    <p>The Beginning</p>
  </div>

  <div class="card card2">
    <img src="https://i.imgur.com/c3xIJO0.jpeg">
    <p>The Journey</p>
  </div>

  <div class="card card3">
    <img src="https://i.imgur.com/HgBD7Mz.jpeg">
    <p>The Promise</p>
  </div>

  <div class="card card4">
    <img src="https://i.imgur.com/stPpfXJ.jpeg">
    <p>Forever</p>
  </div>

  <!-- CENTER FRAME -->
  <div class="frame">
    <h3>Order of Events</h3>
    <p>2:00 PM – Arrival</p>
    <p>3:00 PM – Ceremony</p>
    <p>5:00 PM – Reception</p>

    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScueXyfNMzhTMvDMtRraSgaGaPuuLd8D1myfrTZ8_XArCumfw/viewform" target="_blank">
      RSVP
    </a>
  </div>

  <!-- LOCATION -->
  <div class="location">
    <h4>📍 Bohol Tropics</h4>
    <p>Tagbilaran City, Bohol</p>

    <a class="btn"
       href="https://www.google.com/maps/search/?api=1&query=Bohol+Tropics"
       target="_blank">
       View Map
    </a>
  </div>

</div>

</body>
</html>
