<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ezra & Gil Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: #e7ddd0;
  color: #3b2a22;
  overflow-x: hidden;
}

/* LOADER */
.loader {
  position: fixed;
  inset: 0;
  background: #e7ddd0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  font-family: 'Great Vibes';
  font-size: 32px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-family: 'Great Vibes';
  font-size: 50px;
}

/* SECTION */
.section {
  position: relative;
  width: 85%;
  max-width: 1000px;
  margin: 80px auto;
  padding: 80px 30px;
  border-radius: 20px;
  background-image: var(--bg);
  background-size: cover;
  background-position: center;
  overflow: hidden;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.section.show {
  opacity: 1;
  transform: translateY(0);
}

.section::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(248,241,232,0.85);
}

/* CONTENT */
.panel {
  position: relative;
  z-index: 1;
  text-align: center;
}

/* FLOAT IMAGES */
.float-left, .float-right {
  position: absolute;
  width: 140px;
}

.float-left {
  top: -30px;
  left: -30px;
  transform: rotate(-6deg);
}

.float-right {
  bottom: -30px;
  right: -30px;
  transform: rotate(6deg);
}

.float-left img, .float-right img {
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: #3b2a22;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

/* GALLERY */
.gallery {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.gallery img {
  height: 200px;
  border-radius: 12px;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #fffaf4;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

/* MOBILE */
@media(max-width:600px){
  .float-left, .float-right { display:none; }
}
</style>
</head>

<body>

<div class="loader">Loading Love...</div>

<div class="hero">
  <h1>Ezra & Gil</h1>
  <p>August 8, 2026 • Bohol Tropics</p>
</div>

<!-- STORY -->
<div class="section" style="--bg:url('https://i.imgur.com/hDLxn03.jpeg')">
  <div class="float-left"><img src="https://i.imgur.com/fDf6us1.jpeg"></div>

  <div class="panel">
    <h2>Our Story</h2>
    <p>A journey of love and choosing each other.</p>
  </div>

  <div class="float-right"><img src="https://i.imgur.com/OscEMZZ.jpeg"></div>
</div>

<!-- TIMELINE -->
<div class="section" style="--bg:url('https://i.imgur.com/HgBD7Mz.jpeg')">
  <div class="panel">
    <h2>Timeline</h2>
    <p>2PM Arrival</p>
    <p>3PM Ceremony</p>
    <p>5PM Reception</p>
  </div>
</div>

<!-- LOCATION -->
<div class="section" style="--bg:url('https://i.imgur.com/stPpfXJ.jpeg')">
  <div class="panel">
    <h2>Location</h2>
    <p>Bohol Tropics</p>
    <a class="btn" href="https://maps.google.com?q=Bohol+Tropics" target="_blank">View Map</a>
  </div>
</div>

<!-- GALLERY -->
<div class="section" style="--bg:url('https://i.imgur.com/zHzz8Rs.jpeg')">
  <div class="panel">
    <h2>Gallery</h2>
    <div class="gallery">
      <img src="https://i.imgur.com/KqLlOYF.jpeg">
      <img src="https://i.imgur.com/zHzz8Rs.jpeg">
      <img src="https://i.imgur.com/fDf6us1.jpeg">
    </div>
  </div>
</div>

<!-- RSVP -->
<div class="section" style="--bg:url('https://i.imgur.com/iM5iOhy.jpeg')">
  <div class="panel">
    <h2>RSVP</h2>
    <div class="btn" onclick="openModal()">Confirm Attendance</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="rsvpModal">
  <div class="modal-content">
    <h3>RSVP</h3>
    <p>Please confirm via form</p>
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScueXyfNMzhTMvDMtRraSgaGaPuuLd8D1myfrTZ8_XArCumfw/viewform" target="_blank">Open Form</a>
    <br><br>
    <div class="btn" onclick="closeModal()">Close</div>
  </div>
</div>

<script>
// loader
window.onload = () => {
  document.querySelector(".loader").style.display = "none";
};

// scroll animation
const sections = document.querySelectorAll(".section");
window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    if(sec.getBoundingClientRect().top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

// modal
function openModal(){
  document.getElementById("rsvpModal").style.display="flex";
}
function closeModal(){
  document.getElementById("rsvpModal").style.display="none";
}
</script>

</body>
</html>
