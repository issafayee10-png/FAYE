<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra & Gil | Cinematic Wedding Film</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f6ddc7;
    --text:#3a2a22;
    --accent:#c06a3d;
    --card:rgba(255,255,255,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#f6ddc7,#f3d2bb);
    color:var(--text);
    overflow-x:hidden;
    scroll-snap-type:y mandatory;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/noise.png');
    opacity:0.05;
    pointer-events:none;
    z-index:999;
}

/* CINEMATIC SCENES */
.scene{
    min-height:100vh;
    scroll-snap-align:start;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 20px;
    position:relative;
}

h1,h2{font-family:'Playfair Display',serif;}

/* INTRO */
.intro{
    position:fixed;
    inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0.85),rgba(0,0,0,0.6));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#fff;
    z-index:9999;
    text-align:center;
}

.intro h1{
    font-family:'Great Vibes',cursive;
    font-size:60px;
}

.intro button{
    margin-top:20px;
    padding:10px 18px;
    border:none;
    border-radius:30px;
    background:var(--accent);
    color:#fff;
    cursor:pointer;
}

/* HERO CINEMATIC */
.hero{
    background:
        linear-gradient(to top, rgba(30,15,10,0.7), rgba(0,0,0,0.2)),
        url('https://i.imgur.com/HgBD7Mz.jpeg') center/cover no-repeat;
    color:#fff;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:72px;
    animation:fadeUp 2s ease;
}

.hero p{opacity:0.9;}

/* CARD */
.card{
    background:var(--card);
    padding:22px;
    border-radius:18px;
    backdrop-filter:blur(10px);
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
    max-width:700px;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}
.countdown div{min-width:55px;}
.countdown h3{color:var(--accent);font-size:16px;}
.countdown p{font-size:10px;opacity:0.7;}

/* SLIDESHOW CINEMATIC (KEN BURNS) */
.slideshow{
    position:relative;
    width:100%;
    max-width:700px;
    height:400px;
    overflow:hidden;
    border-radius:18px;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1.5s ease;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoom 6s ease-in-out infinite;
}

@keyframes zoom{
    0%{transform:scale(1.05);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1.05);}
}

/* MAP */
.map iframe{
    width:100%;
    height:260px;
    border:0;
    border-radius:16px;
}

/* MUSIC BUTTON */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 14px;
    border-radius:30px;
    z-index:9999;
}

/* PETALS */
.petal{
    position:fixed;
    top:-10px;
    width:7px;
    height:7px;
    background:rgba(255,210,180,0.7);
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(30px);opacity:0;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* MOBILE */
@media(max-width:768px){
    .hero h1{font-size:40px;}
    .slideshow{height:260px;}
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
    <h1>Ezra & Gil</h1>
    <p>A Cinematic Wedding Experience</p>
    <button onclick="enterSite()">Enter Film</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b2c6.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<!-- HERO SCENE -->
<section class="scene hero">
    <div>
        <h1>Ezra & Gil</h1>
        <p>We’re getting married</p>
        <p>August 8, 2026</p>
    </div>
</section>

<!-- STORY SCENE -->
<section class="scene">
    <div class="card">
        <h2>Our Story</h2>
        <p>A love story written softly through time and moments.</p>
    </div>
</section>

<!-- SLIDESHOW SCENE -->
<section class="scene">
    <div class="slideshow">
        <div class="slide"><img src="https://i.imgur.com/HgBD7Mz.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/kZ9Y1kr.jpeg"></div>
        <div class="slide"><img src="https://i.imgur.com/fDf6us1.jpeg"></div>
    </div>
</section>

<!-- DETAILS -->
<section class="scene">
    <div class="card">
        <h2>Wedding Details</h2>
        <p>August 8, 2026</p>
        <p>3:00 PM</p>
        <p>Maribojoc Church, Bohol</p>
    </div>
</section>

<!-- MAP -->
<section class="scene">
    <div class="card map">
        <h2>Location</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3932.300598257248!2d123.84111061018679!3d9.740584777405351"></iframe>
    </div>
</section>

<!-- COUNTDOWN -->
<section class="scene">
    <div class="card countdown">
        <div><h3 id="days">0</h3><p>Days</p></div>
        <div><h3 id="hours">0</h3><p>Hrs</p></div>
        <div><h3 id="minutes">0</h3><p>Mins</p></div>
        <div><h3 id="seconds">0</h3><p>Secs</p></div>
    </div>
</section>

<script>
function enterSite(){
    document.getElementById('intro').style.display='none';
    let m=document.getElementById('music');
    m.volume=0;
    m.play();
    let fade=setInterval(()=>{
        if(m.volume<0.5)m.volume+=0.05;
        else clearInterval(fade);
    },200);
}

function toggleMusic(){
    let m=document.getElementById('music');
    if(m.paused)m.play(); else m.pause();
}

const wedding=new Date("August 8, 2026 15:00:00").getTime();
setInterval(()=>{
    let now=new Date().getTime();
    let d=wedding-now;
    let day=86400000,h=3600000,m=60000,s=1000;

    document.getElementById("days").innerText=Math.floor(d/day);
    document.getElementById("hours").innerText=Math.floor((d%day)/h);
    document.getElementById("minutes").innerText=Math.floor((d%h)/m);
    document.getElementById("seconds").innerText=Math.floor((d%m)/s);
},1000);

const sections=document.querySelectorAll('.scene');
const obs=new IntersectionObserver(e=>{
    e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('show');});
});
sections.forEach(s=>obs.observe(s));

let i=0;
function show(){
    let slides=document.querySelectorAll('.slide');
    slides.forEach(s=>s.style.opacity=0);
    i++; if(i>slides.length)i=1;
    slides[i-1].style.opacity=1;
    setTimeout(show,4000);
}
show();

for(let i=0;i<30;i++){
    let p=document.createElement('div');
    p.className='petal';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(5+Math.random()*5)+'s';
    document.body.appendChild(p);
}
</script>

</body>
</html>
